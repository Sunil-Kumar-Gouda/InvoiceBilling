name: CI

# on:
#   push:
#   pull_request:
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Keep CI aligned with global.json for deterministic builds
          dotnet-version: "8.0.416"
        
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      # Quality gate: fail CI if C# formatting drifts from the repo baseline.
      # Developers can fix locally by running: dotnet format
      - name: Install dotnet-format
        run: |
          dotnet tool install -g dotnet-format
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Dotnet format (verify)
        run: dotnet format --verify-no-changes --no-restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/invoice-ui/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Frontend install
        working-directory: frontend/invoice-ui
        run: npm ci

      - name: Frontend lint
        working-directory: frontend/invoice-ui
        run: npm run lint

      - name: Frontend build
        working-directory: frontend/invoice-ui
        run: npm run build
